[pytest]
# General options
addopts = -v --tb=short
testpaths = project
# Marker options
markers =
    happy: happy path tests
	rainy: rainy day tests
    database: ueats database command tests
	user: ueats user command tests
	wallet: ueats wallet command tests
	restaurant: ueats restaurant command tests
	menu: ueats menu command tests
	order: ueats order command tests
	delivery: ueats delivery command tests
# Logging options
log_cli = true
log_cli_level = DEBUG
log_cli_format = [%(asctime)s][%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
log_file = project/ueats.log
log_file_level = ERROR
log_file_format = %(asctime)s %(levelname)s %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S
